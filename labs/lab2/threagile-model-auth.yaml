        description: "Auth API verifies JWT signature and expiry on each protected request before serving user-specific state."
        protocol: in-process-library-call
        authentication: token
        authorization: technical-user
        tags: ["jwt"]
        vpn: false
        ip_filtered: false
        readonly: false
