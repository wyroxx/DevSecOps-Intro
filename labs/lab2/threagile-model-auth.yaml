    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: application
    technology: web-application
    tags: ["auth", "app"]
    internet: false
    machine: container
    encryption: none
    owner: Lab Owner
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: "Central authentication entry point for credentials and tokens."
    multi_tenant: true
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - credentials
      - jwt-token
      - session-state
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      Query Credentials:
        target: credential-store
        description: "Credential lookup for login; parameterized SQL should be used to avoid injection."
        protocol: sql-access-protocol
        authentication: credentials
